name: Build Demo

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Customer product page URL"
        required: true
        type: string
      slug:
        description: "Demo slug (e.g. acme-spring-2025)"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push JSON files to gh-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Build demo
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PAGES_REPO: ${{ github.repository }}
          GITHUB_PAGES_BRANCH: gh-pages
        run: uv run main.py build --url "${{ inputs.url }}" --slug "${{ inputs.slug }}"
